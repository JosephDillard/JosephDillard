- title: Map-to-AI Incident Analyst
  subtitle: Local MCP bridge and focused map demo
  repo: map-to-ai-incident-analyst
  status: Local checkout, no public remote yet
  summary: MapLibre incident review surface for northern New Mexico with risk scoring, MGRS tools, response-support lookup, and bridge routes for assistant analysis.
  impact: It works by scoring incidents with deterministic factors, showing why an incident is high risk, running OpenStreetMap-style support lookup, and packaging selected map context for analysis.
  fit: This is the focused incident-analysis workflow that can be folded into the Status Board shared map and supported by the MCP services.
  tags:
    - MapLibre
    - MCP bridge
    - Incident review
    - MGRS
    - OpenStreetMap
    - Risk scoring
    - Python
    - Response support
