- title: GeoAI Asset Detection Platform
  subtitle: Python-based GeoAI workflow platform
  repo: geoai-asset-detection-platform
  status: Public GitHub repo
  summary: Python GeoAI workflow platform for tiling imagery, running segmentation models, vectorizing detections, and loading GIS-ready outputs to GeoPackage/PostGIS.
  impact: Turns imagery and model output into spatial intelligence that can be loaded to PostGIS, published through GeoServer, and visualized in the Status Board.
  fit: Provides the GeoAI processing side of the portfolio stack, including COG input, model workflow, vector output, training export, and operational map handoff.
