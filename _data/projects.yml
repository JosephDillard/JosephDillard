- title: Geospatial Data Gateway
  subtitle: Spatial data ingestion and notification layer
  repo: geospatial-data-gateway
  status: Public GitHub repo
  summary: .NET and Python geospatial data gateway for registering datasets, loading validated layers into PostGIS, and broadcasting live map refresh events.
  impact: Acts as the control plane between validated source data, PostGIS-backed layers, ingest job status, and live browser map refresh behavior.
  fit: Bridges the ETL toolkit and Status Board by turning accepted data handoffs into tracked ingest jobs and map refresh events.
