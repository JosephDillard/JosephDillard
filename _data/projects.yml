- title: Geospatial Status Board
  subtitle: Operational map viewer and status dashboard
  repo: geospatial-status-board
  status: Public GitHub repo
  summary: Grails, MapLibre, GeoServer, and PostGIS operational status board for incidents, infrastructure, GeoAI outputs, response support, and live geospatial map workflows.
  impact: This is the main visualization layer. It shows shared map tools, layer controls, incident review, GeoAI detections, MGRS, weather context, gateway refresh integration, and reviewer-visible operational map behavior.
  fit: Consumes published spatial services and data gateway refresh events while exposing the browser map experience a user or reviewer can actually inspect.
  tags:
