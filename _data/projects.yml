- title: Geospatial Status Board
  subtitle: Operational map viewer and status dashboard
  repo: geospatial-status-board
  status: Public GitHub repo
  summary: Grails and MapLibre operational map for incidents, infrastructure, GeoAI outputs, response support, weather context, MGRS, and reviewed assistant map actions.
  impact: It works by running a Grails web app with a simple H2 default path, optional PostGIS/GeoServer integration for spatial services, and MapLibre for the browser map tools.
  fit: This is the visible review surface where gateway refresh events, GeoAI output, incident data, support lookup, and assistant actions become something an analyst can inspect.
  tags:
    - Grails
    - MapLibre
    - GeoServer
    - PostGIS
    - WFS
    - Dashboard
    - SignalR
    - MGRS
    - Incident mapping
    - GeoAI layers
  links:
    - label: Repo
      url: https://github.com/JosephDillard/geospatial-status-board
    - label: README
      url: https://github.com/JosephDillard/geospatial-status-board/blob/master/README.md
    - label: Architecture
      url: https://github.com/JosephDillard/geospatial-status-board/blob/master/docs/geospatial-architecture.md

- title: GeoAI Asset Detection Platform
  subtitle: Python-based GeoAI workflow platform
  repo: geoai-asset-detection-platform
  status: Public GitHub repo
  summary: Python GeoAI workflow platform for turning imagery into GIS-ready detections that can be exported, loaded, and reviewed on a map.
  impact: It works by taking imagery or COG input, preparing tiles or chips, running model inference through Python/GeoAI libraries, vectorizing results, and writing GeoPackage/PostGIS-ready outputs.
  fit: This is the processing layer that creates spatial intelligence before the data gateway or Status Board publishes it for operational review.
  tags:
    - GeoAI
    - Python
    - PostGIS
    - GeoPackage
    - COG
    - PyTorch
    - ONNX
    - GeoPandas
    - FastAPI
  links:
    - label: Repo
      url: https://github.com/JosephDillard/geoai-asset-detection-platform
    - label: README
      url: https://github.com/JosephDillard/geoai-asset-detection-platform/blob/main/README.md

- title: Geospatial Data Gateway
  subtitle: Spatial data ingestion and notification layer
  repo: geospatial-data-gateway
  status: Public GitHub repo
  summary: .NET and Python gateway for registering datasets, tracking ingest jobs, loading accepted geospatial data, and notifying maps when layers change.
  impact: It works through ASP.NET Core APIs, Python file-processing workers, PostGIS-backed storage, and SignalR-style refresh events for browser clients.
  fit: This is the handoff layer between validated files and the Status Board map, where accepted data becomes a tracked load and then a refreshable layer.
  tags:
    - .NET
    - ASP.NET Core
    - SignalR
    - Python
    - PostGIS
    - GeoJSON
    - Shapefile
    - GeoPackage
    - API
  links:
    - label: Repo
      url: https://github.com/JosephDillard/geospatial-data-gateway
    - label: README
      url: https://github.com/JosephDillard/geospatial-data-gateway/blob/master/README.md

- title: Geospatial ETL Validation Toolkit
  subtitle: Data readiness and handoff reporting
  repo: geospatial-etl-validation-toolkit
  status: Public GitHub repo
  summary: Python toolkit for checking GeoJSON, CSV, GeoPackage, Shapefile, and GeoTIFF inputs before PostGIS load or customer handoff.
  impact: It works by reading vector data with GeoPandas or Pyogrio, inspecting raster metadata for COG readiness, applying required-field/domain rules, and producing batch readiness reports.
  fit: This is the data-quality gate that catches schema, geometry, CRS, domain, and raster issues before downstream systems depend on the data.
  tags:
    - Python
    - GeoPandas
    - Pyogrio
    - PostGIS
    - GeoPackage
    - Shapefile
    - GeoTIFF
    - COG readiness
    - Data QA
  links:
    - label: Repo
      url: https://github.com/JosephDillard/geospatial-etl-validation-toolkit
    - label: README
      url: https://github.com/JosephDillard/geospatial-etl-validation-toolkit/blob/main/README.md

- title: Geospatial MCP Services
  subtitle: Map-aware assistant tooling
  repo: geospatial-mcp-services
  status: Public GitHub repo
  summary: Docker-ready MCP servers that let an assistant ask controlled geospatial questions about selected map coordinates.
  impact: It works by exposing MCP stdio tools for GeoNames/Wikipedia lookup and incident analysis, while those tools can still call ordinary APIs internally.
  fit: This is the assistant/tool layer that enriches map clicks or selected incidents without hiding where MCP ends and normal service calls begin.
